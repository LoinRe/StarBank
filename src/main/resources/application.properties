# ============= H2: =============
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=
spring.datasource.password=
spring.datasource.type=com.zaxxer.hikari.HikariDataSource

# ============= PostgreSQL:  =============
spring.datasource.rules.url=jdbc:postgresql://localhost:5432/StarBankRules
spring.datasource.rules.username=User
spring.datasource.rules.password=123
spring.datasource.rules.driver-class-name=org.postgresql.Driver
spring.datasource.rules.type=com.zaxxer.hikari.HikariDataSource

# ============= Spring Data JDBC =============
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.jdbc.JdbcRepositoriesAutoConfiguration

# ============= JPA¸ Hibernate=============
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# ============= Liquibase ============
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:liquibase/changelog-master.yml
spring.liquibase.url=${spring.datasource.rules.url}
spring.liquibase.user=${spring.datasource.rules.username}
spring.liquibase.password=${spring.datasource.rules.password}

# =============
logging.level.org.springframework.jdbc=DEBUG
logging.level.com.zaxxer.hikari=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

